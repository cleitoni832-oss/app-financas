<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle Financeiro</title>
<style>
body { font-family: Arial; padding: 20px; text-align:center; }
input, button { padding:10px; margin:5px; width:80%; }
ul { list-style:none; padding:0; }
li { background:#eee; margin:5px; padding:10px; }
</style>
</head>

<body>

<div id="login">
  <h2>Entrar</h2>
  <input id="nome" placeholder="Seu nome">
  <button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none;">
  <h2>Olá, <span id="user"></span></h2>

  <input id="desc" placeholder="Descrição">
  <input id="valor" type="number" placeholder="Valor">
  <button onclick="add()">Adicionar</button>

  <h3>Total: R$ <span id="total">0</span></h3>

  <ul id="lista"></ul>

  <button onclick="sair()">Sair</button>
</div>

<script>
let despesas = JSON.parse(localStorage.getItem("despesas")) || [];

function entrar() {
  const nome = document.getElementById("nome").value;
  if (!nome) return alert("Digite seu nome");
  localStorage.setItem("user", nome);
  mostrar();
}

function mostrar() {
  const nome = localStorage.getItem("user");
  if (nome) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user").innerText = nome;
    render();
  }
}

function add() {
  const desc = document.getElementById("desc").value;
  const valor = parseFloat(document.getElementById("valor").value);

  if (!desc || !valor) return alert("Preencha tudo");

  despesas.push({ desc, valor });
  localStorage.setItem("despesas", JSON.stringify(despesas));

  document.getElementById("desc").value = "";
  document.getElementById("valor").value = "";

  render();
}

function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let total = 0;

  despesas.forEach(d => {
    total += d.valor;
    lista.innerHTML += `<li>${d.desc} - R$ ${d.valor}</li>`;
  });

  document.getElementById("total").innerText = total.toFixed(2);
}

function sair() {
  localStorage.removeItem("user");
  location.reload();
}

mostrar();
</script>

</body>
</html>
